name: 🐛 Bug Report
description: Report a reproducible bug or unexpected behavior.
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have confirmed the bug exists on the latest release.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Call memlimit.SetFromCgroup(...) with '...'
        2. Run under '...' (e.g. docker run --memory=256m ...)
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include the returned value / error and any log output.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: memlimit Version
      description: Module version (e.g. the tag in go.mod) or commit.
      placeholder: "e.g. v0.1.0"
    validations:
      required: true

  - type: input
    id: goversion
    attributes:
      label: Go Version
      description: Output of `go version`.
      placeholder: "e.g. go1.26.4"
    validations:
      required: true

  - type: dropdown
    id: cgroup
    attributes:
      label: cgroup Version
      options:
        - cgroup v2 (unified)
        - cgroup v1
        - hybrid
        - not applicable / non-Linux
        - not sure
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: OS & Runtime
      description: OS, architecture, and how it runs (bare metal / Docker / Kubernetes).
      placeholder: "e.g. Ubuntu 22.04 amd64, Docker with --memory=256m"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Cgroup file contents, config snippets, or anything else that helps.
      render: shell
