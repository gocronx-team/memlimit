version: 2
updates:
  # Library module (dependency-free today; catches any future addition + Go bumps).
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]

  # Comparison harness (pulls the reference library for benchmarks).
  - package-ecosystem: gomod
    directory: /compare
    schedule:
      interval: weekly
    groups:
      compare-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    # Don't auto-take major bumps of CI actions (e.g. golangci-lint-action),
    # they can change inputs or require a newer linter and break CI. Bump manually.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
